<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine-Flix Streaming Cotes</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #e50914; /* Rouge Netflix */
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Conteneur pour le défilement façon application */
        .streaming-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-left: 10px;
            border-left: 4px solid #e50914;
            padding-left: 10px;
        }

        /* Grille des cartes */
        .grid-cotes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        /* Style des cartes "Netflix" */
        .card {
            background: #181818;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: #e50914;
        }

        .coup-num {
            display: block;
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 10px;
        }

        .prix {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .devise {
            font-size: 12px;
            color: #e50914;
        }

        .btn-parier {
            margin-top: 10px;
            background-color: #e50914;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>Cine-Flix BJ</h1>

    <div class="streaming-container">
        <p class="section-title">Liste des Cotes (1 à 100)</p>
        
        <div class="grid-cotes" id="liste-cotes">
            </div>
    </div>

    <script>
        const container = document.getElementById('liste-cotes');
        
        // Boucle pour créer les 100 coups
        for (let i = 1; i <= 100; i++) {
            let mise = i * 100; // Augmentation de 100 F à chaque fois
            
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <span class="coup-num">COUP ${i}</span>
                <span class="prix">${mise} <span class="devise">FCFA</span></span>
                <button class="btn-parier" onclick="alert('Pari enregistré pour le Coup ${i}')">Parier</button>
            `;
            
            container.appendChild(card);
        }
    </script>

</body>
</html>
